<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ETKM T-Shirt — Stay Back 200 Feet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* ── The sign shape ── */
  .sign {
    width: 620px;
    border-radius: 32px;
    border: 8px solid #FFFFFF;
    background: #000000;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Top section: STAY BACK ── */
  .top-section {
    padding: 32px 40px 20px;
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .stay-back {
    font-family: Impact, Arial Narrow, sans-serif;
    font-size: 122px;
    font-weight: 900;
    color: #FFFFFF;
    text-align: center;
    line-height: 0.92;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── 200 FEET ── */
  .two-hundred {
    font-family: Impact, Arial Narrow, sans-serif;
    font-size: 138px;
    font-weight: 900;
    font-style: italic;
    color: #CC0000;
    text-align: center;
    line-height: 0.88;
    letter-spacing: -2px;
    text-transform: uppercase;
    /* original has a yellow outline — we use black outline on red */
    -webkit-text-stroke: 3px #000000;
    paint-order: stroke fill;
  }

  /* ── Bottom red band ── */
  .bottom-section {
    background: #CC0000;
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 18px 28px 18px 20px;
    gap: 18px;
    min-height: 120px;
  }

  /* Warning triangle */
  .triangle-wrap {
    flex-shrink: 0;
    width: 96px;
    height: 84px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .triangle-wrap svg {
    width: 96px;
    height: 84px;
  }

  /* Disclaimer text */
  .disclaimer {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }

  .disclaimer-line {
    font-family: Impact, Arial Narrow, sans-serif;
    font-size: 36px;
    font-weight: 900;
    color: #000000;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.1;
  }

  .disclaimer-line .any {
    color: #FFFFFF;
    font-style: italic;
    text-decoration: underline;
  }

  /* print note */
  .note {
    color: #555;
    font-size: 11px;
    font-family: Arial, sans-serif;
    letter-spacing: 1px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="page">

  <div class="sign">

    <div class="top-section">
      <div class="stay-back">Stay Back</div>
      <div class="two-hundred">200 Feet</div>
    </div>

    <div class="bottom-section">

      <!-- Warning triangle: black body, white border, white ! -->
      <div class="triangle-wrap">
        <svg viewBox="0 0 96 84" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="48,6 92,78 4,78" fill="#000000" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round"/>
          <rect x="44" y="30" width="8" height="24" rx="2" fill="#FFFFFF"/>
          <rect x="44" y="60" width="8" height="8" rx="2" fill="#FFFFFF"/>
        </svg>
      </div>

      <div class="disclaimer">
        <div class="disclaimer-line">Not Responsible</div>
        <div class="disclaimer-line">For <span class="any">Any</span> Damage</div>
      </div>

    </div>
  </div>

  <div class="note">East Texas Krav Maga — Tyler, Texas &nbsp;|&nbsp; T-shirt back design</div>

</div>
</body>
</html>
