<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETKM T-Shirt Back — Stay Back 200 Feet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Barlow+Condensed:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
  }

  /* Print area: 12x14 inch @ 96dpi ≈ 1152x1344px — scale to fit screen */
  .design-wrapper {
    background: #000000;
    width: 700px;
    padding: 48px 56px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ─── TOP RULE ─── */
  .rule-top {
    width: 100%;
    height: 3px;
    background: #CC0000;
    margin-bottom: 36px;
  }

  /* ─── WARNING BADGE ─── */
  .badge {
    border: 3px solid #CC0000;
    padding: 6px 20px;
    margin-bottom: 28px;
  }

  .badge-text {
    color: #CC0000;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    font-family: Arial, Helvetica, sans-serif;
  }

  /* ─── STAY BACK ─── */
  .stay-back {
    color: #FFFFFF;
    font-size: 108px;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 0.9;
    text-align: center;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', Impact, Arial Narrow, sans-serif;
    font-style: italic;
  }

  /* ─── DIVIDER ─── */
  .divider {
    width: 100%;
    height: 2px;
    background: #333333;
    margin: 28px 0;
  }

  /* ─── 200 FEET ─── */
  .two-hundred {
    color: #CC0000;
    font-size: 148px;
    font-weight: 900;
    letter-spacing: -4px;
    line-height: 0.85;
    text-align: center;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', Impact, Arial Narrow, sans-serif;
    font-style: italic;
  }

  /* ─── TRIANGLE ─── */
  .triangle-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 32px;
    width: 100%;
  }

  .h-rule {
    flex: 1;
    height: 2px;
    background: #444444;
  }

  .triangle-svg {
    flex-shrink: 0;
  }

  /* ─── NOT RESPONSIBLE ─── */
  .disclaimer-block {
    width: 100%;
    margin-top: 24px;
    text-align: center;
  }

  .not-responsible {
    color: #FFFFFF;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1.3;
  }

  .for-any {
    color: #FFFFFF;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-family: Arial, Helvetica, sans-serif;
  }

  .any-word {
    color: #CC0000;
    font-style: italic;
    text-decoration: underline;
  }

  .damage {
    color: #FFFFFF;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-family: Arial, Helvetica, sans-serif;
  }

  /* ─── BOTTOM RULE ─── */
  .rule-bottom {
    width: 100%;
    height: 3px;
    background: #CC0000;
    margin-top: 36px;
    margin-bottom: 24px;
  }

  /* ─── ETKM FOOTER ─── */
  .footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .school-name {
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-family: Arial, Helvetica, sans-serif;
  }

  .school-location {
    color: #666666;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-family: Arial, Helvetica, sans-serif;
  }

  /* Print output hint */
  .print-note {
    color: #555;
    font-size: 11px;
    text-align: center;
    margin-top: 24px;
    font-family: Arial, sans-serif;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div>
  <div class="design-wrapper">

    <div class="rule-top"></div>

    <div class="badge">
      <span class="badge-text">Warning</span>
    </div>

    <div class="stay-back">Stay Back</div>

    <div class="divider"></div>

    <div class="two-hundred">200 Feet</div>

    <div class="triangle-row">
      <div class="h-rule"></div>
      <svg class="triangle-svg" width="64" height="56" viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="32,4 62,52 2,52" stroke="#CC0000" stroke-width="3" fill="none"/>
        <text x="32" y="46" text-anchor="middle" font-size="30" font-weight="900" fill="#CC0000" font-family="Arial">!</text>
      </svg>
      <div class="h-rule"></div>
    </div>

    <div class="disclaimer-block">
      <div class="not-responsible">Not Responsible</div>
      <div class="for-any">For <span class="any-word">Any</span> Damage</div>
    </div>

    <div class="rule-bottom"></div>

    <div class="footer">
      <div class="school-name">East Texas Krav Maga</div>
      <div class="school-location">Longview, Texas</div>
    </div>

  </div>

  <div class="print-note">
    T-shirt back design — 12&times;14 in print area — 300 DPI export recommended
  </div>
</div>

</body>
</html>
