{% extends "_scheduler_base.html" %}
{% block title %}AI Generator — ETKM Social Publishing{% endblock %}
{% block tab_content %}
<div class="etkm-card">
  <h2 class="etkm-card__title">AI Campaign Generator</h2>

  <form id="ai-form">
    <div class="etkm-fields-grid">
      <div class="etkm-field">
        <label class="etkm-field__label">Program / Topic</label>
        <input class="etkm-input" type="text" name="program" id="ai-program"
               placeholder="e.g. Adult Krav Maga" />
        <div class="etkm-quickfill">
          <button type="button" data-fill="Adult Krav Maga">Adult Krav Maga</button>
          <button type="button" data-fill="Women's Self-Defense">Women's Self-Defense</button>
          <button type="button" data-fill="Youth Program">Youth Program</button>
          <button type="button" data-fill="LE / Security">LE / Security</button>
          <button type="button" data-fill="General">General</button>
        </div>
      </div>
      <div class="etkm-field">
        <label class="etkm-field__label">Tone</label>
        <select class="etkm-select" name="tone">
          <option>Direct &amp; confident</option>
          <option>Educational</option>
          <option>Inspirational</option>
          <option>Conversational</option>
        </select>
      </div>
    </div>

    <div class="etkm-field">
      <label class="etkm-field__label">Campaign Goal</label>
      <textarea class="etkm-textarea" name="goal" rows="3" required
                placeholder="e.g. Drive sign-ups for the March Fight Back ETX workshop"></textarea>
    </div>

    <div class="etkm-field">
      <label class="etkm-field__label">Platforms</label>
      <div class="etkm-checkbox-row">
        <label><input type="checkbox" name="platforms" value="facebook" checked /> Facebook</label>
        <label><input type="checkbox" name="platforms" value="instagram" /> Instagram</label>
        <label><input type="checkbox" name="platforms" value="linkedin" /> LinkedIn</label>
      </div>
    </div>

    <div class="etkm-fields-grid--3 etkm-fields-grid">
      <div class="etkm-field">
        <label class="etkm-field__label">Start Date</label>
        <input class="etkm-input" type="date" name="start_date" required />
      </div>
      <div class="etkm-field">
        <label class="etkm-field__label">End Date</label>
        <input class="etkm-input" type="date" name="end_date" required />
      </div>
      <div class="etkm-field">
        <label class="etkm-field__label">Posts per Platform</label>
        <input class="etkm-input" type="number" name="posts_per_platform" min="1" max="14" value="3" />
      </div>
    </div>

    <div class="etkm-field">
      <label class="etkm-field__label">Campaign Tag</label>
      <input class="etkm-input" type="text" name="campaign_tag" required
             placeholder="e.g. fight-back-march-2026" />
    </div>

    <div id="ai-banner"></div>

    <button class="etkm-btn etkm-btn--primary etkm-btn--block" type="submit">
      ✨ Generate Campaign Posts
    </button>
    <p class="etkm-text-faded" style="font-size:12px;margin-top:12px;text-align:center;">
      Phase H wires the Claude API call. Form will post to /api/ai/generate-campaign once enabled.
    </p>
  </form>
</div>

<script src="{{ url_for('static', filename='js/scheduler.js') }}"></script>
{% endblock %}
