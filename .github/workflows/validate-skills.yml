name: Validate Skill Files

on:
  push:
    paths:
      - 'skills/**'
      - 'scripts/skill_metadata.py'
      - 'scripts/validate_skills.py'
      - 'scripts/generate_skills_registry.py'
      - 'SKILLS.md'
      - '.github/workflows/validate-skills.yml'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/skill_metadata.py'
      - 'scripts/validate_skills.py'
      - 'scripts/generate_skills_registry.py'
      - 'SKILLS.md'
      - '.github/workflows/validate-skills.yml'
  workflow_dispatch:

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate skill schema
        run: python3 scripts/validate_skills.py

      - name: Verify SKILLS.md is current
        run: python3 scripts/generate_skills_registry.py --check
