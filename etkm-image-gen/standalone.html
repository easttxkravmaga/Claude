<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETKM AI Image Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }

  :root {
    --bg:      #000;
    --surface: #0d0d0d;
    --surface2:#141414;
    --border:  #1f1f1f;
    --text:    #fff;
    --muted:   #555;
    --red:     #ff0000;
    --red-dim: #1a0000;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }

  .bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.08em; }

  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── Layout ───────────────────────────────────── */
  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 0 24px; height: 52px; flex-shrink: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }

  .layout { display: flex; flex: 1; overflow: hidden; }

  aside {
    width: 320px; min-width: 320px; overflow-y: auto;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 20px; gap: 20px;
  }

  main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  /* ── Inputs ───────────────────────────────────── */
  .field-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing: 0.18em; color: var(--muted);
    margin-bottom: 7px; display: block;
  }

  textarea, input[type="password"], input[type="text"] {
    width: 100%; background: #000; border: 1px solid #2a2a2a;
    color: var(--text); padding: 10px 12px; font-size: 13px;
    font-family: inherit; outline: none; line-height: 1.5;
    transition: border-color 0.15s;
  }
  textarea:focus, input:focus { border-color: var(--red); }
  textarea { resize: vertical; min-height: 110px; }

  .char-row { display: flex; justify-content: flex-end; margin-top: 4px; font-size: 11px; color: var(--muted); }

  /* ── Size pills ───────────────────────────────── */
  .size-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .size-btn {
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 6px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    gap: 3px;
  }
  .size-btn:hover { border-color: #444; color: #aaa; }
  .size-btn.active { border-color: var(--red); color: var(--text); background: var(--red-dim); }
  .size-btn .sz-label { font-weight: 600; font-size: 13px; }
  .size-btn .sz-sub   { font-size: 9px; color: inherit; opacity: 0.6; }

  /* ── Generate button ──────────────────────────── */
  #gen-btn {
    width: 100%; padding: 14px; background: var(--red); border: 1px solid var(--red);
    color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
    cursor: pointer; font-family: inherit; display: flex; align-items: center;
    justify-content: center; gap: 8px; transition: background 0.15s;
  }
  #gen-btn:hover:not(:disabled) { background: #cc0000; }
  #gen-btn:disabled { background: #111; border-color: var(--border); color: #444; cursor: not-allowed; }

  /* ── API key panel ────────────────────────────── */
  #key-panel { display: none; padding: 12px; background: var(--surface2); border: 1px solid var(--border); }
  #key-panel label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; }

  #key-toggle {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-size: 11px; padding: 5px 10px; cursor: pointer; font-family: inherit;
    margin-left: auto; transition: all 0.15s;
  }
  #key-toggle:hover { border-color: var(--red); color: var(--text); }

  /* ── Main output ──────────────────────────────── */
  .output-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; gap: 24px; }

  /* empty state */
  #empty { text-align: center; color: #2a2a2a; }
  #empty .empty-icon { font-size: 56px; line-height: 1; margin-bottom: 16px; }
  #empty p { font-size: 13px; line-height: 1.6; }
  #empty kbd { color: var(--red); font-family: inherit; }

  /* loading */
  #loading { display: none; flex-direction: column; align-items: center; gap: 20px; text-align: center; }
  #loading-icon { font-size: 48px; color: var(--red); animation: pulse-red 1.5s ease-in-out infinite; }
  #loading-msg { color: #aaa; font-size: 14px; font-weight: 500; }

  .dots { display: flex; gap: 6px; justify-content: center; margin-top: 6px; }
  .dot { width: 6px; height: 6px; background: var(--red); animation: bounce 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.30s; }

  /* result */
  #result { display: none; width: 100%; max-width: 720px; }
  #result img { width: 100%; display: block; border: 1px solid var(--border); object-fit: contain; }

  .action-bar { display: flex; gap: 8px; margin-top: 12px; align-items: center; flex-wrap: wrap; }

  .action-btn {
    padding: 9px 16px; background: var(--surface); border: 1px solid var(--border);
    color: #ccc; font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--red); color: var(--text); }
  .action-btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
  .action-btn.primary:hover { background: #cc0000; }

  .prompt-echo {
    flex: 1; font-size: 11px; color: #333; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis; min-width: 0;
  }

  .icon-btn {
    background: none; border: none; color: #444; cursor: pointer;
    font-size: 16px; padding: 2px 6px; flex-shrink: 0; line-height: 1;
  }
  .icon-btn:hover { color: #aaa; }

  /* refine */
  #refine-panel { display: none; border: 1px solid var(--border); background: var(--surface); margin-top: 16px; }
  .refine-header { padding: 10px 16px; border-bottom: 1px solid var(--border); font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 0.12em; color: #888; }
  .refine-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

  .refine-row { display: flex; gap: 8px; }

  #undo-btn { display: none; padding: 13px 16px; background: var(--surface2); border: 1px solid var(--border); color: #777; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; cursor: pointer; font-family: inherit; white-space: nowrap; }
  #undo-btn:hover { color: var(--text); border-color: #444; }

  /* ── Toast ────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    padding: 12px 18px; font-size: 13px; max-width: 340px;
    opacity: 0; transform: translateY(8px); pointer-events: none;
    transition: opacity 0.2s, transform 0.2s; border: 1px solid;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.err  { background: #1a0000; border-color: var(--red); color: #ffaaaa; }
  #toast.ok   { background: #001a00; border-color: #00aa00; color: #aaffaa; }

  /* ── Keyframes ────────────────────────────────── */
  @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-7px)} }
  @keyframes spin   { to{transform:rotate(360deg)} }

  @media (max-width: 700px) {
    .layout { flex-direction: column; }
    aside { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <span class="bebas" style="font-size:22px">ETKM</span>
    <span class="bebas" style="font-size:22px;color:var(--red)">AI GENERATOR</span>
    <button id="key-toggle" onclick="toggleKey()">⚙ API KEY</button>
  </header>

  <div class="layout">

    <!-- Sidebar controls -->
    <aside>

      <!-- API Key -->
      <div id="key-panel">
        <label for="api-key">Gemini API Key</label>
        <input type="password" id="api-key" placeholder="AIza…" autocomplete="off" oninput="saveKey()" />
        <p style="font-size:10px;color:#444;margin-top:6px">Stored in localStorage. Never sent anywhere except Google.</p>
      </div>

      <!-- Prompt -->
      <div>
        <span class="field-label">PROMPT</span>
        <textarea id="prompt" placeholder="Describe the image you want to create…" maxlength="5000" oninput="updateCount()" onkeydown="handleKey(event)"></textarea>
        <div class="char-row"><span id="char-count" style="color:var(--muted)">0</span>&nbsp;/ 5,000</div>
      </div>

      <!-- Size -->
      <div>
        <span class="field-label">SIZE</span>
        <div class="size-grid" id="size-grid">
          <button class="size-btn active" data-ratio="1:1" onclick="selectSize(this)">
            <span class="sz-label">Square</span>
            <span class="sz-sub">1024 × 1024</span>
          </button>
          <button class="size-btn" data-ratio="16:9" onclick="selectSize(this)">
            <span class="sz-label">Landscape</span>
            <span class="sz-sub">1792 × 1024</span>
          </button>
          <button class="size-btn" data-ratio="9:16" onclick="selectSize(this)">
            <span class="sz-label">Portrait</span>
            <span class="sz-sub">1024 × 1792</span>
          </button>
        </div>
      </div>

      <!-- Generate -->
      <button id="gen-btn" onclick="generate()">✦ GENERATE <span style="opacity:.4;font-size:11px">⌘↵</span></button>

    </aside>

    <!-- Main output -->
    <main>
      <div class="output-wrap" id="output-wrap">

        <!-- Empty -->
        <div id="empty">
          <div class="empty-icon">✦</div>
          <p>Enter a prompt and press <kbd>⌘ Enter</kbd><br />or click Generate.</p>
        </div>

        <!-- Loading -->
        <div id="loading">
          <div id="loading-icon">✦</div>
          <div>
            <div id="loading-msg">Initializing canvas…</div>
            <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          </div>
        </div>

        <!-- Result -->
        <div id="result">
          <img id="gen-img" src="" alt="Generated image" />

          <div class="action-bar">
            <button class="action-btn primary" onclick="downloadImg()">⬇ DOWNLOAD PNG</button>
            <button class="action-btn" onclick="editPrompt()">✎ EDIT PROMPT</button>
            <span class="prompt-echo" id="prompt-echo"></span>
            <button class="icon-btn" onclick="copyPrompt()" title="Copy prompt">⎘</button>
          </div>

          <!-- Refine -->
          <div id="refine-panel">
            <div class="refine-header">REFINE IMAGE</div>
            <div class="refine-body">
              <textarea id="refine-input" rows="3" maxlength="2000" placeholder="Describe changes — 'add fog', 'shift lighting to blue', 'make it more cinematic'…" style="min-height:unset"></textarea>
              <div class="refine-row">
                <button class="action-btn" style="flex:1;padding:12px 0" onclick="refine()">APPLY REFINEMENT</button>
                <button id="undo-btn" onclick="undoRefine()">UNDO REFINE</button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </main>

  </div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let currentImageB64  = '';
let currentImageMime = 'image/jpeg';
let currentPrompt    = '';
let currentRatio     = '1:1';
let previousB64      = '';
let previousPrompt   = '';
let generating       = false;
let msgTimer         = null;

const MESSAGES = [
  'Initializing canvas…',
  'Interpreting prompt…',
  'Composing the scene…',
  'Rendering details…',
  'Applying final touches…',
  'Almost there…',
];

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('etkm_gemini_key');
  if (saved) document.getElementById('api-key').value = saved;
});

// ── API key ───────────────────────────────────────────────────────────────────
function toggleKey() {
  const p = document.getElementById('key-panel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}
function saveKey() {
  localStorage.setItem('etkm_gemini_key', document.getElementById('api-key').value.trim());
}

// ── Size ──────────────────────────────────────────────────────────────────────
function selectSize(btn) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRatio = btn.dataset.ratio;
}

// ── Prompt ────────────────────────────────────────────────────────────────────
function updateCount() {
  const len = document.getElementById('prompt').value.length;
  const el  = document.getElementById('char-count');
  el.textContent   = len;
  el.style.color   = len >= 4500 ? '#ff0000' : 'var(--muted)';
}

function handleKey(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); generate(); }
}

// ── Generate ──────────────────────────────────────────────────────────────────
async function generate() {
  if (generating) return;

  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { toast('Enter a prompt first.', 'err'); document.getElementById('prompt').focus(); return; }

  const key = document.getElementById('api-key').value.trim()
           || localStorage.getItem('etkm_gemini_key') || '';
  if (!key) { toast('Add your Gemini API key (⚙ API KEY).', 'err'); toggleKey(); return; }

  generating = true;
  setLoading(true);

  try {
    const b64 = await callImagen(prompt, currentRatio, key);
    previousB64    = currentImageB64;
    previousPrompt = currentPrompt;
    currentImageB64  = b64;
    currentImageMime = 'image/jpeg';
    currentPrompt    = prompt;
    showImage(b64, prompt);
    toast('Image generated!', 'ok');
  } catch (err) {
    toast(err.message || 'Generation failed.', 'err');
    setLoading(false);
    showEmpty();
  } finally {
    generating = false;
  }
}

async function callImagen(prompt, ratio, key) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key=${key}`;
  const res = await fetch(url, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      instances:  [{ prompt }],
      parameters: { sampleCount: 1, aspectRatio: ratio, outputMimeType: 'image/jpeg' },
    }),
  });

  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body?.error?.message || `API error ${res.status}`);
  }

  const data = await res.json();
  const pred = data?.predictions?.[0];
  if (!pred?.bytesBase64Encoded) throw new Error('No image returned by API.');
  return pred.bytesBase64Encoded;
}

// ── Refine ────────────────────────────────────────────────────────────────────
async function refine() {
  const instruction = document.getElementById('refine-input').value.trim();
  if (!instruction) { toast('Enter a refinement instruction.', 'err'); return; }

  const key = document.getElementById('api-key').value.trim()
           || localStorage.getItem('etkm_gemini_key') || '';
  if (!key) { toast('Add your Gemini API key.', 'err'); return; }

  const combinedPrompt = `${currentPrompt}. ${instruction}`;

  generating = true;
  setLoading(true);

  try {
    const b64 = await callImagen(combinedPrompt, currentRatio, key);
    previousB64      = currentImageB64;
    previousPrompt   = currentPrompt;
    currentImageB64  = b64;
    currentPrompt    = combinedPrompt;
    showImage(b64, currentPrompt);
    document.getElementById('undo-btn').style.display = 'block';
    toast('Refinement applied!', 'ok');
  } catch (err) {
    toast(err.message || 'Refinement failed.', 'err');
    setLoading(false);
    showResult();
  } finally {
    generating = false;
  }
}

function undoRefine() {
  if (!previousB64) return;
  currentImageB64 = previousB64;
  currentPrompt   = previousPrompt;
  previousB64     = '';
  showImage(currentImageB64, currentPrompt);
  document.getElementById('undo-btn').style.display = 'none';
  toast('Reverted to previous image.', 'ok');
}

// ── UI helpers ────────────────────────────────────────────────────────────────
const LOADING_MSGS = [
  'Initializing canvas…', 'Interpreting prompt…', 'Composing the scene…',
  'Rendering details…', 'Applying final touches…', 'Almost there…',
];

function setLoading(on) {
  const btn = document.getElementById('gen-btn');
  btn.disabled = on;

  if (on) {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .7s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> GENERATING…';

    document.getElementById('empty').style.display    = 'none';
    document.getElementById('result').style.display   = 'none';
    document.getElementById('loading').style.display  = 'flex';

    let i = 0;
    msgTimer = setInterval(() => {
      i = (i + 1) % LOADING_MSGS.length;
      document.getElementById('loading-msg').textContent = LOADING_MSGS[i];
    }, 2600);
  } else {
    clearInterval(msgTimer);
    btn.innerHTML = '✦ GENERATE <span style="opacity:.4;font-size:11px">⌘↵</span>';
    document.getElementById('loading').style.display = 'none';
  }
}

function showImage(b64, prompt) {
  setLoading(false);
  const src = `data:image/jpeg;base64,${b64}`;
  document.getElementById('gen-img').src        = src;
  document.getElementById('prompt-echo').textContent = prompt;
  document.getElementById('refine-input').value = '';
  showResult();
}

function showResult() {
  document.getElementById('empty').style.display        = 'none';
  document.getElementById('loading').style.display      = 'none';
  document.getElementById('result').style.display       = 'block';
  document.getElementById('refine-panel').style.display = 'block';
}

function showEmpty() {
  document.getElementById('empty').style.display   = 'flex';
  document.getElementById('result').style.display  = 'none';
  document.getElementById('loading').style.display = 'none';
}

// ── Actions ───────────────────────────────────────────────────────────────────
function downloadImg() {
  if (!currentImageB64) return;
  const a    = document.createElement('a');
  a.href     = `data:image/jpeg;base64,${currentImageB64}`;
  a.download = `etkm-${Date.now()}.jpg`;
  a.click();
}

function editPrompt() {
  document.getElementById('prompt').value = currentPrompt;
  updateCount();
  document.getElementById('prompt').focus();
}

function copyPrompt() {
  if (!currentPrompt) return;
  navigator.clipboard.writeText(currentPrompt)
    .then(() => toast('Prompt copied!', 'ok'))
    .catch(() => toast('Copy failed.', 'err'));
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
}
</script>
</body>
</html>
